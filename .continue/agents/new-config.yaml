name: ResellHub Local Config
version: 1.0.0
schema: v1


############################################################
# CONFIGURACIÓN COMPATIBILIDAD TOTAL v4.7
############################################################
models:

  # 🧠 CHAT RÁPIDO (Groq)
  - name: CEREBRO-GROQ
    provider: groq
    apiKey: ${GROQ_API_KEY}
    apiBase: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile
    roles:
      - chat

  # 🛠️ EDITOR PRINCIPAL (DeepSeek - OpenRouter)
  - name: OBRERO-DEEPSEEK
    provider: openrouter
    apiKey: ${OPEN_API_KEY}	
    model: deepseek/deepseek-chat
    roles:
      - edit
      - apply
      - chat

  # 🧠 RAZONAMIENTO COMPLEJO (Claude)
  - name: ESTRATEGA-CLAUDE
    provider: openrouter
    apiKey: ${OPEN_API_KEY}	
    model: anthropic/claude-3.5-sonnet
    roles:
      - chat

  # ⚡ AUTOCOMPLETE LOCAL
  - name: LOCAL-QWEN
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://127.0.0.1:11434
    roles:
      - autocomplete

############################################################
# AGENTES
############################################################
agents:
  - name: ResellHubV4
    file: C:/resell-hub-app/.cursor/rules/resellhub_v4.1.mdc
    description: "Agentes para flujo de reparación de configuración EAS"

defaultAgent: ResellHubV4

############################################################
# SKILLS
############################################################
skills:
  - name: GlobalSkills
    file: C:/resell-hub-app/skills.json
    description: "Habilidades para los distintos roles en el proyecto"

############################################################
# DOCUMENTACIÓN Y DASHBOARD
############################################################
documentation:
  - name: DESIGN_SYSTEM
    file: C:/resell-hub-app/DESIGN_SYSTEM.md
    description: "Memoria de cambios y guía de diseño del proyecto"
  - name: Dashboard
    file: C:/resell-hub-app/ResellHub_Dashboard.html
    description: "Mapa de diseño visual del proyecto"

